services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      CODING_RUNNER_URL: ${CODING_RUNNER_URL:-http://coding-runner:8010}
    depends_on:
      - coding-runner
    ports:
      - "8000:8004"

  coding-runner:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    command: uvicorn runner_service:app --host 0.0.0.0 --port 8010
    environment:
      CODING_RUNNER_USE_DOCKER: ${CODING_RUNNER_USE_DOCKER:-true}
      CODING_RUNNER_CPP_IMAGE: ${CODING_RUNNER_CPP_IMAGE:-gcc:14}
    expose:
      - "8010"
    volumes:
      # Only the dedicated runner gets Docker access.
      - /var/run/docker.sock:/var/run/docker.sock

