name: Docker Images

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

env:
  PLATFORM_SERVICES: caliber-frontend caliber-backend
  PLATFORM_DISPATCH_TOKEN: ${{ secrets.PLATFORM_DISPATCH_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: ghcr.io/ucsb-caliber/caliber-frontend
            context: .
          - image: ghcr.io/ucsb-caliber/caliber-backend
            context: backend
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=ref,event=tag

      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  notify:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      PLATFORM_DISPATCH_TOKEN: ${{ secrets.PLATFORM_DISPATCH_TOKEN }}
    steps:
      - name: Notify platform staging
        if: env.PLATFORM_DISPATCH_TOKEN != ''
        run: |
          python3 - <<'PY' > payload.json
          import json
          import os
          payload = {
              "event_type": "service-image-published",
              "client_payload": {
                  "image_tag": f"sha-{os.environ['GITHUB_SHA']}",
                  "services": os.environ["PLATFORM_SERVICES"],
              },
          }
          print(json.dumps(payload))
          PY
          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${PLATFORM_DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/ucsb-caliber/platform/dispatches \
            -d @payload.json
